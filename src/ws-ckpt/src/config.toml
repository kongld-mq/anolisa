# ws-ckpt configuration file
# Location: /etc/ws-ckpt/config.toml

# ── Scheduling ──
# auto_cleanup_keep = 20              # Unpinned snapshots to keep per workspace
# auto_cleanup_interval_secs = 600    # Auto-cleanup interval (seconds)
# health_check_interval_secs = 300    # Health check interval (seconds)
# fs_warn_threshold_percent = 90      # Filesystem usage warning threshold (%)

# ── Backend selection ──
# [backend]
# type = "auto"                       # "auto" | "btrfs-base" | "btrfs-loop" | "overlayfs"

# ── BtrfsLoop backend ──
# [backend.btrfs-loop]
# img_path = "/data/ws-ckpt/btrfs-data.img"  # Loop image file path
# img_min_size_gb = 30                        # Minimum image size (GB)
# img_capacity_percent = 30                   # Image size as % of partition

# ── BtrfsBase backend ──
# [backend.btrfs-base]
# btrfs_mount = "/data"               # (reserved) Target btrfs partition

# ── OverlayFS backend ──
# [backend.overlayfs]                 # (reserved, not yet implemented)
